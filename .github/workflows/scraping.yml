# Scraping quotidien dans le cloud ("git scraping") :
# chaque jour de semaine apres la cloture d'Abidjan, GitHub Actions scrape
# les cotations/dividendes/secteurs et committe les JSON dans data/.
# Le depot devient la memoire du projet — aucun PC allume n'est necessaire.
name: Scraping quotidien

on:
  schedule:
    # 18h00 UTC = 18h00 a Abidjan (GMT), bien apres la cloture (~15h GMT).
    # Lundi -> vendredi uniquement : la BRVM est fermee le week-end.
    - cron: "0 18 * * 1-5"
  workflow_dispatch: # bouton "Run workflow" pour lancer a la main

permissions:
  contents: write # necessaire pour committer les donnees

concurrency:
  group: scraping-brvm
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: pip install -r backend/requirements.txt

      - name: Scraper la BRVM
        working-directory: backend
        run: python -m app.cloud_ingest

      - name: Committer les données
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Aucune nouvelle donnée (jour férié ?)"
          else
            git commit -m "data: cotations du $(date -u +%F)"
            git pull --rebase
            git push
          fi
