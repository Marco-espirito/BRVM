# Integration continue : a chaque push / pull request,
#   - les tests backend (pytest) doivent passer
#   - le front doit compiler sans erreur
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    name: Tests backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lancer les tests
        run: pytest -v

      - name: Vérifier les dépendances et la syntaxe
        run: |
          pip check
          python -m compileall app tests

  frontend-build:
    name: Build frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler le front
        run: npm run build

      - name: Auditer les dépendances de production
        run: npm audit --omit=dev
